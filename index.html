<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Recintos</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f3f6;
    }

    /* NAVBAR */
    .navbar {
      background: #007bff;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h1 {
      font-size: 18px;
      margin: 0;
    }

    .navbar button {
      background: white;
      color: #007bff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* CONTENIDO */
    .contenedor {
      max-width: 900px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .buscador {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #sugerencias {
      position: absolute;
      width: 100%;
      background: white;
      border-radius: 8px;
      margin-top: 5px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      z-index: 999;
    }

    #sugerencias div {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    #sugerencias div:hover {
      background: #f5f5f5;
    }

    button.buscar {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    #map {
      margin-top: 15px;
      width: 100%;
      height: 65vh;
      border-radius: 12px;
    }
  </style>
</head>

  <div class="navbar">
    <h1>Recintos</h1>

      <button class="buscar" onclick="buscar()">Buscar</button>
    </div>

    <div id="map"></div>

    buscarInput = document.getElementById("buscar");
    buscarInput.addEventListener("input", function () {
      let texto = this.value.toLowerCase();
      let cont = document.getElementById("sugerencias");
      cont.innerHTML = "";

      if (texto.length < 2) return;

      let res = datos.filter(d =>
        d.operador.toLowerCase().includes(texto) ||
        d.carnet.toLowerCase().includes(texto)
      );

      res.forEach(d => {
        let div = document.createElement("div");
        div.innerHTML = d.operador;
        div.onclick = () => seleccionar(d);
        cont.appendChild(div);
      });
    });

    function seleccionar(d) {
      document.getElementById("buscar").value = d.operador;
      document.getElementById("sugerencias").innerHTML = "";
      mostrar(d);
    }

    function mostrar(d) {
      let u = recintos[d.recinto];
      if (marcador) map.removeLayer(marcador);
      marcador = L.marker([u.lat, u.lng]).addTo(map);

      let html = `<b>${d.recinto}</b><br><a target="_blank" href="https://www.google.com/maps?q=${u.lat},${u.lng}">🚗 Cómo llegar</a>`;

      marcador.bindPopup(html);
      map.setView([u.lat, u.lng], 17);
      setTimeout(() => marcador.openPopup(), 200);
    }

    function buscar() {
      let t = document.getElementById("buscar").value.toLowerCase().trim();

      let d = datos.find(x =>
        x.operador.toLowerCase().includes(t) ||
        x.carnet.toLowerCase().includes(t)
      );

      if (d) mostrar(d);
      else alert("No encontrado");
    }



    function cerrarAyuda() {
      document.getElementById("modalAyuda").style.display = "none";
