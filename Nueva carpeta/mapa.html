<!DOCTYPE html>

<style>

body{
font-family: Arial;
margin:0;
background:#f1f3f6;
}

/* CONTENEDOR */
.contenedor{
max-width:900px;
margin:auto;
padding:15px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* TITULO */
h2{
text-align:center;
margin-bottom:15px;
}

/* BUSCADOR */
.buscador{
position:relative;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

/* SUGERENCIAS */
#sugerencias{
position:absolute;
width:100%;
background:white;
border-radius:8px;
margin-top:5px;
max-height:200px;
overflow-y:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
z-index:999;
}

#sugerencias div{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

#sugerencias div:hover{
background:#f5f5f5;
}

/* BOTON */
button{
margin-top:10px;
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

/* MAPA */
#map{
margin-top:15px;
width:100%;
height:65vh;
border-radius:12px;
}

/* MOBILE */
@media(max-width:600px){
h2{font-size:18px;}
}

</style>

</head>

// AUTOCOMPLETADO
document.getElementById("buscar").addEventListener("input", function(){

var texto = this.value.toLowerCase();
var cont = document.getElementById("sugerencias");

cont.innerHTML = "";

if(texto.length < 2) return;

var resultados = datos.filter(d =>
d.operador.toLowerCase().includes(texto) ||
d.carnet.toLowerCase().includes(texto)
).slice(0,6);

resultados.forEach(d => {

var div = document.createElement("div");
div.innerHTML = "<b>"+d.operador+"</b><br><small>"+d.carnet+"</small>";

div.onclick = function(){
seleccionar(d);
};

cont.appendChild(div);

});

});

// SELECCIONAR
function seleccionar(d){
document.getElementById("buscar").value = d.operador;
document.getElementById("sugerencias").innerHTML = "";
mostrar(d);
}

// MOSTRAR (FIX AQUI)
function mostrar(d){

var u = recintos[d.recinto];

if(!u){
alert("Sin coordenadas");
return;
}

if(marcador){
map.removeLayer(marcador);
}

marcador = L.marker([u.lat, u.lng]).addTo(map);

var contenido = `
<b>${d.recinto}</b><br><br>
<a target="_blank" href="https://www.google.com/maps?q=${u.lat},${u.lng}">
Cómo llegar
</a>
`;

marcador.bindPopup(contenido);

// centrar primero
map.setView([u.lat, u.lng],17);

// abrir después (FIX)
setTimeout(() => {
marcador.openPopup();
}, 200);

// también al hacer clic
marcador.on('click', function(){
this.openPopup();
});

}

// BUSCAR
function buscar(){

var texto = document.getElementById("buscar").value.toLowerCase();

var d = datos.find(x =>
x.operador.toLowerCase().includes(texto) ||
x.carnet.toLowerCase().includes(texto)
);

if(d){
mostrar(d);
}else{
alert("No encontrado");
}

}

// ENTER
document.getElementById("buscar").addEventListener("keypress", function(e){
if(e.key === "Enter") buscar();
});
